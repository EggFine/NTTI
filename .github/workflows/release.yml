name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Package build output
        run: |
          TAG=${{ steps.version.outputs.tag }}
          # Build output zip (standalone deployable)
          cd .next
          zip -r ../ntti-build-${TAG}.zip .
          cd ..
          # Source code zip (exclude node_modules, .next, .git)
          zip -r ntti-source-${TAG}.zip . \
            -x "node_modules/*" \
            -x ".next/*" \
            -x ".git/*" \
            -x "ntti-build-*.zip" \
            -x "ntti-source-*.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NTTI ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ntti-build-*.zip
            ntti-source-*.zip
